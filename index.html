<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster - نظام إدارة وتخطيط الموانئ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#08080A;
  --gold:#FFD60A;
  --gold-dim:#B8981F;
  --cream:#F5F5F7;
  --glass:rgba(255,255,255,0.055);
  --glass-strong:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.10);
  --danger:#FF5C5C;
  --ok:#3DDC84;
  --warn:#FFB020;
  --radius:20px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(circle at 15% 0%, rgba(255,214,10,0.06), transparent 40%),
    radial-gradient(circle at 100% 20%, rgba(255,255,255,0.05), transparent 35%),
    radial-gradient(circle at 0% 100%, rgba(255,214,10,0.04), transparent 40%),
    var(--bg);
  color:var(--cream);
  font-family:Arial, "SF Arabic", "Segoe UI", system-ui, -apple-system, sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.glass{
  background:var(--glass);
  backdrop-filter:blur(50px) saturate(260%);
  -webkit-backdrop-filter:blur(50px) saturate(260%);
  border:1px solid var(--border);
}
.card{
  background:var(--glass);
  backdrop-filter:blur(50px) saturate(260%);
  -webkit-backdrop-filter:blur(50px) saturate(260%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
}
h1,h2,h3{font-weight:700;margin:0 0 10px 0;}
h1{color:var(--gold);font-size:1.4rem;letter-spacing:.3px;}
h2{font-size:1.15rem;color:var(--cream);}
h3{font-size:1rem;color:var(--gold);}
label{display:block;font-size:.8rem;color:#c8c8cf;margin-bottom:6px;}
input,select,textarea{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--cream);
  border-radius:14px;
  padding:11px 13px;
  font-size:.92rem;
  font-family:Arial, "SF Arabic", sans-serif;
  direction:rtl;
  unicode-bidi:plaintext;
  text-align:right;
  word-wrap: break-word;
  overflow-wrap: break-word;
  transition:box-shadow .18s cubic-bezier(.175,.885,.32,1.275), transform .18s cubic-bezier(.175,.885,.32,1.275), border-color .18s;
  outline:none;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(255,214,10,0.6);
  box-shadow:0 0 0 4px rgba(255,214,10,0.15);
  transform:scale(1.015);
}
textarea{resize:vertical;min-height:75px;line-height:1.6;}
.field{margin-bottom:12px;}
button{
  font-family:inherit;
  cursor:pointer;
  border:none;
  border-radius:14px;
  padding:11px 18px;
  font-size:.9rem;
  font-weight:600;
  transition:transform .18s cubic-bezier(.175,.885,.32,1.275), box-shadow .18s;
}
button:active{transform:scale(.96);}
.btn-gold{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#141406;}
.btn-gold:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 22px rgba(255,214,10,0.25);}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--cream);border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-danger{background:rgba(255,92,92,0.15);color:var(--danger);border:1px solid rgba(255,92,92,0.3);}
.btn-sm{padding:7px 12px;font-size:.78rem;border-radius:10px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr;}}
#app{max-width:1100px;margin:0 auto;padding:20px 16px 90px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;margin-bottom:18px;border-radius:22px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold);}
.brand span{font-weight:800;font-size:1.25rem;letter-spacing:1px;color:var(--gold);}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.tab{padding:9px 16px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);font-size:.85rem;cursor:pointer;color:#d8d8de;}
.tab.active{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#141406;font-weight:700;border-color:transparent;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:100px;font-size:.72rem;font-weight:700;}
.pill-A{background:rgba(61,220,132,0.16);color:var(--ok);}
.pill-B{background:rgba(255,176,32,0.16);color:var(--warn);}
.pill-C{background:rgba(255,92,92,0.16);color:var(--danger);}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:14px;background:rgba(255,255,255,0.035);border:1px solid var(--border);margin-bottom:8px;}
.muted{color:#9a9aa2;font-size:.8rem;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.notice{background:rgba(255,214,10,0.06);border:1px solid rgba(255,214,10,0.25);border-radius:14px;padding:10px 14px;font-size:.78rem;color:#e8d998;margin-top:8px;}
table{width:100%;border-collapse:collapse;font-size:.85rem;}
th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--border);word-wrap:break-word;overflow-wrap:break-word;}
th{color:var(--gold);font-weight:700;}
.crane-block{border:1px solid var(--border);border-radius:16px;padding:14px;margin-top:12px;background:rgba(255,255,255,0.03);}
.chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:100px;padding:5px 12px;font-size:.78rem;margin:3px;}
.chip button{background:none;border:none;color:var(--danger);padding:0;font-size:.8rem;cursor:pointer;}
.empty{text-align:center;padding:30px;color:#8b8b93;}
.login-wrap{min-height:90vh;display:flex;align-items:center;justify-content:center;}
.login-card{max-width:420px;width:100%;}
.tbt-box{border:1.5px solid rgba(255,214,10,0.4);border-radius:18px;padding:16px;margin-bottom:16px;background:rgba(255,214,10,0.04);}
.tbt-box textarea{font-family:Arial, "SF Arabic", sans-serif;font-size:0.98rem;line-height:1.6;}
.ai-panel{position:fixed;left:16px;bottom:16px;width:min(360px,90vw);max-height:70vh;display:none;flex-direction:column;z-index:50;border-radius:22px;overflow:hidden;}
.ai-panel.open{display:flex;}
.ai-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.ai-msg{padding:9px 12px;border-radius:14px;font-size:.82rem;max-width:85%;word-wrap:break-word;overflow-wrap:break-word;}
.ai-msg.user{align-self:flex-start;background:rgba(255,214,10,0.14);}
.ai-msg.bot{align-self:flex-end;background:rgba(255,255,255,0.06);}
.ai-fab{position:fixed;left:16px;bottom:16px;z-index:49;border-radius:100px;padding:13px 20px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.audit{font-size:.75rem;color:#9a9aa2;}
.audit b{color:var(--cream);}

/* Printable Roster Table Styling */
.rt-table{width:100%;border-collapse:collapse;background:#fff;color:#111;font-family:Arial, "SF Arabic", sans-serif;font-size:.95rem;}
.rt-table th,.rt-table td{border:1.5px solid #000;padding:8px 10px;text-align:center;}
.rt-table thead tr:first-child th.rt-title{background:#1f3b57;color:#fff;font-size:1.15rem;font-weight:800;letter-spacing:.5px;}
.rt-table thead tr:first-child th.rt-team{background:#1f3b57;color:#fff;font-size:.9rem;}
.rt-table thead tr:nth-child(2) th{background:#7f8fa4;color:#fff;font-weight:700;}
.rt-table .rt-en{font-weight:400;font-size:.8rem;}
.rt-table tbody td{background:#c9d2da;font-weight:600;}
.rt-table tbody tr:nth-child(even) td{background:#dfe5ea;}
.rt-table td.rt-team{background:#b9c3cd;font-weight:700;}
.rt-table td.rt-op{font-weight:700;}
.rt-table td.rt-crane{font-weight:800;color:#155724;}
.print-wrap{background:#fff;border-radius:10px;padding:16px;direction:rtl;text-align:right;color:#000;font-family:Arial, "SF Arabic", sans-serif;}
.print-tbt{border:2px solid #C9A100;background:#FFF6D6;color:#3a2e00;border-radius:10px;padding:12px 14px;margin-bottom:12px;direction:rtl;text-align:right;}
.print-tbt h4{margin:0 0 6px 0;color:#8a6d00;font-size:1.05rem;font-family:Arial, sans-serif;}
.print-tbt p{margin:0;white-space:pre-wrap;unicode-bidi:plaintext;font-size:.95rem;line-height:1.5;font-family:Arial, sans-serif;}
.print-tasks{border:2px solid #2e7d32;background:#EAF6EA;color:#1b3a1b;border-radius:10px;padding:12px 14px;margin-top:12px;direction:rtl;text-align:right;}
.print-tasks h4{margin:0 0 8px 0;color:#2e7d32;font-size:1rem;font-family:Arial, sans-serif;}
.print-task-row{display:flex;justify-content:space-between;gap:10px;padding:6px 4px;border-bottom:1px dashed #b7d8b7;font-size:.88rem;font-family:Arial, sans-serif;}
.print-task-row:last-child{border-bottom:none;}

/* Handover Excel Style Print Table */
.vessel-handover-block{margin-bottom:18px;}
.excel-handover-table{width:100%;border-collapse:collapse;background:#fff;color:#000;font-family:Arial, sans-serif;font-size:1.05rem;direction:rtl;text-align:center;}
.excel-handover-table th,.excel-handover-table td{border:1.5px solid #000;padding:10px 8px;font-weight:bold;}
.excel-handover-table th{background:#e2e2e2;color:#000;font-size:1rem;}
.excel-handover-table th.vessel-header{background:#1f3b57;color:#fff;font-size:1.15rem;text-align:center;padding:10px;}
.excel-handover-table tr:nth-child(even) td{background:#f9f9f9;}
.print-yard{border:2px solid #1f3b57;border-radius:10px;overflow:hidden;margin-top:14px;font-family:Arial, sans-serif;direction:rtl;text-align:right;}
.print-yard h4{margin:0;background:#1f3b57;color:#fff;padding:10px 14px;font-size:1.05rem;}
.print-yard .body{padding:12px 14px;background:#f4f7f9;color:#111;font-size:.95rem;white-space:pre-wrap;unicode-bidi:plaintext;line-height:1.6;}

/* Rotation Calendar Styles */
.cal-shift-D{background:linear-gradient(135deg,#1e88e5,#1565c0);color:#fff;font-weight:bold;cursor:pointer;}
.cal-shift-N{background:linear-gradient(135deg,#5e35b1,#311b92);color:#fff;font-weight:bold;cursor:pointer;}
.cal-shift-O{background:rgba(255,255,255,0.06);color:#a0a0ab;cursor:pointer;}
.cal-table{width:100%;border-collapse:collapse;background:rgba(15,15,20,0.7);color:var(--cream);font-size:.85rem;border-radius:14px;overflow:hidden;}
.cal-table th,.cal-table td{border:1px solid var(--border);padding:8px 6px;text-align:center;}
.cal-table th{background:rgba(255,255,255,0.08);color:var(--gold);}
.holiday-badge{display:inline-block;background:rgba(255,92,92,0.2);color:var(--danger);border:1px solid rgba(255,92,92,0.4);border-radius:6px;padding:2px 6px;font-size:.7rem;margin-top:3px;}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:rgba(255,214,10,0.3);border-radius:10px;}
</style>
</head>
<body>
<div id="app"></div>

<div class="ai-fab glass" id="aiFab" onclick="toggleAI()">🤖 <span>المساعد الذكي</span></div>
<div class="ai-panel glass" id="aiPanel">
  <div class="ai-header">
    <b style="color:var(--gold)">مساعد الروستر الذكي</b>
    <button class="btn-ghost btn-sm" onclick="toggleAI()">إغلاق</button>
  </div>
  <div class="ai-msgs" id="aiMsgs"></div>
  <div style="padding:10px;border-top:1px solid var(--border);display:flex;gap:8px;">
    <input id="aiInput" placeholder="اسأل عن نقص الطاقم، التوازن، التنبؤات..." onkeydown="if(event.key==='Enter')sendAI()">
    <button class="btn-gold btn-sm" onclick="sendAI()">إرسال</button>
  </div>
</div>

<script>
/* ===================== STATE & STORAGE ===================== */
let state = null;
let currentTab = 'crew';
let aiHistory = [];

const shiftNamesArabic = {
  1: 'الوردية الأولى',
  2: 'الوردية الثانية',
  3: 'الوردية الثالثة',
  4: 'الوردية الرابعة'
};

function keyFor(email){
  return 'roster_app:' + (email||'').toLowerCase().trim().replace(/[^a-z0-9.]/g,'_');
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function nowStr(){ const d=new Date(); return d.toLocaleString('ar-EG'); }

function blankState(email,name){
  return {
    email, name, shiftName:'الوردية الأولى',
    crew:{ operators:[], loaders:[], forklifts:[], cranes:[], other:[] },
    vessels:[],
    leaves:[],
    handovers:[],
    handoverVessels:[],
    yard:{ name:'', notes:'' },
    rosterDates:{},
    manualShifts:{},
    logs:[],
    geminiApiKey:''
  };
}

function saveState(){
  try{
    if(!state || !state.email) return;
    localStorage.setItem(keyFor(state.email), JSON.stringify(state));
    localStorage.setItem('roster_current_user_email', state.email);
    localStorage.setItem('roster_current_user_name', state.name);
  }catch(e){ console.error('save failed', e); alert('تعذر حفظ البيانات محلياً — تأكد أن مساحة التخزين غير ممتلئة.'); }
}
function log(entity, action, before, after){
  if(!state.logs) state.logs = [];
  state.logs.unshift({id:uid(), ts:nowStr(), entity, action, before, after, user:state.name});
  if(state.logs.length>500) state.logs.length=500;
}

/* ===================== LOGIN ===================== */
function tryLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const name = document.getElementById('loginName').value.trim();
  if(!email || !name){ alert('من فضلك ادخل الاسم والإيميل'); return; }
  try{
    const localData = localStorage.getItem(keyFor(email));
    if(localData){
      state = JSON.parse(localData);
      if(name) state.name = name;
      if(!state.crew.cranes) state.crew.cranes = [];
      if(!state.handoverVessels) state.handoverVessels = [];
      if(!state.yard) state.yard = {name:'', notes:''};
      if(!state.manualShifts) state.manualShifts = {};
    } else {
      state = blankState(email, name);
    }
    saveState();
  }catch(e){
    state = blankState(email, name);
    saveState();
  }
  render();
}

function checkAutoLogin(){
  try{
    const savedEmail = localStorage.getItem('roster_current_user_email');
    const savedName = localStorage.getItem('roster_current_user_name');
    if(savedEmail){
      const localData = localStorage.getItem(keyFor(savedEmail));
      if(localData){
        state = JSON.parse(localData);
        if(savedName) state.name = savedName;
        if(!state.crew.cranes) state.crew.cranes = [];
        if(!state.handoverVessels) state.handoverVessels = [];
        if(!state.yard) state.yard = {name:'', notes:''};
        if(!state.manualShifts) state.manualShifts = {};
      }
    }
  }catch(e){ console.error('auto login failed', e); }
}

function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="login-wrap">
    <div class="card login-card">
      <div class="brand" style="margin-bottom:18px;justify-content:center;">
        <div class="dot"></div><span>ROSTER</span>
      </div>
      <h2 style="text-align:center;color:var(--cream);font-weight:400;margin-bottom:20px;">تسجيل الدخول لحفظ ومزامنة بياناتك</h2>
      <div class="field"><label>الاسم</label><input id="loginName" placeholder="اسمك"></div>
      <div class="field"><label>البريد الإلكتروني</label><input id="loginEmail" placeholder="example@mail.com" type="email"></div>
      <button class="btn-gold" style="width:100%;margin-top:6px;" id="loginBtn" onclick="tryLogin()">دخول</button>
      <p class="muted" style="text-align:center;margin-top:14px;">استخدم نفس الإيميل من أي جهاز لاسترجاع بياناتك المحفوظة.</p>
    </div>
  </div>`;
}

/* ===================== SHELL / TABS ===================== */
const TABS = [
  {id:'crew', label:'الطاقم والأوناش'},
  {id:'pier', label:'بيرس بلان'},
  {id:'roster', label:'الروستر'},
  {id:'calendar', label:'🗓️ تقويم الورديات'},
  {id:'leaves', label:'الإجازات'},
  {id:'handover', label:'التسليم والتسلم'},
  {id:'reports', label:'التقارير'},
  {id:'settings', label:'الإعدادات'},
];

function render(){
  if(!state){ renderLogin(); return; }
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar glass">
      <div class="brand"><div class="dot"></div><span>ROSTER</span></div>
      <div class="row">
        <span class="muted">${esc(state.name)} · ${esc(state.shiftName)}</span>
        <button class="btn-ghost btn-sm" onclick="shareCurrent()">📤 مشاركة كصورة</button>
      </div>
    </div>
    <div class="tabs">
      ${TABS.map(t=>`<div class="tab ${currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</div>`).join('')}
    </div>
    <div id="tabContent"></div>
  `;
  renderTab();
}
function switchTab(id){ currentTab=id; render(); }
function renderTab(){
  const c = document.getElementById('tabContent');
  if(!c) return;
  if(currentTab==='crew') c.innerHTML = viewCrew();
  else if(currentTab==='pier') c.innerHTML = viewPier();
  else if(currentTab==='roster') c.innerHTML = viewRoster();
  else if(currentTab==='calendar') c.innerHTML = viewCalendar();
  else if(currentTab==='leaves') c.innerHTML = viewLeaves();
  else if(currentTab==='handover') c.innerHTML = viewHandover();
  else if(currentTab==='reports') c.innerHTML = viewReports();
  else if(currentTab==='settings') c.innerHTML = viewSettings();
  bindTabEvents();
}

/* ===================== CREW & FLEET ===================== */
function viewCrew(){
  if(!state.crew.cranes) state.crew.cranes = [];
  return `
  <div id="captureArea">
  <h1>الطاقم والأوناش والمعدات</h1>
  <div class="g4">
    <div class="card">
      <h3>🏗️ قائمة الأوناش الدائمة</h3>
      <div id="craneMasterList">${renderMasterCranes()}</div>
      <div class="divider"></div>
      <div class="field"><label>رقم / اسم الونش</label><input id="masterCraneNum" placeholder="مثال: 110 أو 011"></div>
      <button class="btn-gold" style="width:100%" onclick="addMasterCrane()">إضافة ونش جديد</button>
    </div>
    <div class="card">
      <h3>طاقم الوناشين</h3>
      <div id="opList">${renderOperators()}</div>
      <div class="divider"></div>
      <div class="field"><label>اسم الونّاش</label><input id="opName" placeholder="اكتب الاسم"></div>
      <div class="field"><label>التصنيف</label>
        <select id="opRating"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
      </div>
      <button class="btn-gold" style="width:100%" onclick="addOperator()">إضافة ونّاش</button>
    </div>
    <div class="card">
      <h3>معدات - لوادر (Loaders)</h3>
      <div id="loaderList">${renderEquipList('loaders')}</div>
      <div class="divider"></div>
      <div class="field"><label>رقم اللودر</label><input id="loaderNum" placeholder="مثال: 419"></div>
      <button class="btn-gold" style="width:100%" onclick="addEquip('loaders','loaderNum')">إضافة لودر</button>
    </div>
    <div class="card">
      <h3>معدات - شوكة (Forklifts)</h3>
      <div id="forkList">${renderEquipList('forklifts')}</div>
      <div class="divider"></div>
      <div class="field"><label>رقم الشوكة</label><input id="forkNum" placeholder="مثال: F-05"></div>
      <button class="btn-gold" style="width:100%" onclick="addEquip('forklifts','forkNum')">إضافة شوكة</button>
    </div>
  </div>
  </div>`;
}

function renderMasterCranes(){
  const cranes = state.crew.cranes || [];
  if(!cranes.length) return `<div class="empty muted">لا توجد أوناش مسجلة بعد</div>`;
  return cranes.map(c=>`
    <div class="list-item">
      <b>ونش ${esc(c.number)}</b>
      <div class="row">
        <button class="btn-danger btn-sm" onclick="deleteMasterCrane('${c.id}')">حذف</button>
      </div>
    </div>`).join('');
}
function addMasterCrane(){
  const number = document.getElementById('masterCraneNum').value.trim();
  if(!number) return;
  if(!state.crew.cranes) state.crew.cranes = [];
  const c = {id:uid(), number};
  state.crew.cranes.push(c);
  log('ونش دائم','إضافة',null,c);
  saveState(); renderTab();
}
function deleteMasterCrane(id){
  const c = state.crew.cranes.find(x=>x.id===id);

async function handlePierImageUpload(input){
  const file = input.files[0];
  if(!file) return;
  if(!state.geminiApiKey){
    alert('يرجى إضافة مفتاح Gemini API في صفحة الإعدادات أولاً لاستخدام ميزة تحليل الصور بالذكاء الاصطناعي.');
    input.value = '';
    return;
  }
  const statusEl = document.getElementById('pierImageStatus');
  if(statusEl) statusEl.innerText = '⏳ جاري قراءة الصورة واستخراج المراكب...';

  const reader = new FileReader();
  reader.onload = async function(e){
    const base64Data = e.target.result.split(',')[1];
    const mimeType = file.type || 'image/jpeg';

    try {
      const sys = "أنت مساعد خبير بالموانئ. قم بتحليل صورة جدول البيرس بلان (Pier Plan) واستخراج المراكب منها. أريد النتيجة بصيغة JSON فقط مصفوفة كالتالي: [{\"name\":\"اسم المركب\", \"eta\":\"تاريخ ووقت الوصول\", \"cargo\":\"الحمولة\"}]. لا تضف أي نص أو شرح خارج الـ JSON.";
      const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "x-goog-api-key": state.geminiApiKey
          },
          body: JSON.stringify({
            systemInstruction: { parts:[{ text: sys }] },
            contents: [ {
              parts: [
                { text: "استخرج بيانات المراكب من صورة البيرس بلان هذه:" },
                { inlineData: { mimeType: mimeType, data: base64Data } }
              ]
            } ]
          })
        }
      );
      const data = await response.json();
      if(!response.ok) throw new Error(data.error?.message || 'HTTP ' + response.status);
      const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const cleanJson = rawText.replace(/```json|```/g, '').trim();
      const vesselsArray = JSON.parse(cleanJson);

      let count = 0;
      if(Array.isArray(vesselsArray)){
        vesselsArray.forEach(v => {
          if(v.name){
            const newV = {id: uid(), name: v.name, eta: v.eta || '', cargo: v.cargo || ''};
            state.vessels.push(newV);
            count++;
          }
        });
      }
      saveState(); renderTab();
      alert(`تم استخراج وإضافة ${count} مركب من الصورة بنجاح!`);
    } catch(err) {
      console.error(err);
      alert('حدث خطأ أثناء تحليل الصورة: ' + err.message);
      if(statusEl) statusEl.innerText = '';
    }
  };
  reader.readAsDataURL(file);
}

function handlePierExcelUpload(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('pierPasteText').value = e.target.result;
    parsePierText();
  };
  reader.readAsText(file);
}

function parsePierText(){
  const raw = document.getElementById('pierPasteText').value.trim();
  if(!raw){ alert('يرجى لصق نص أو اختيار ملف إكسيل أولاً'); return; }
  const lines = raw.split('\n');
  let count = 0;
  lines.forEach(line=>{
    const parts = line.split(/[\t,|;]+/).map(p=>p.trim()).filter(Boolean);
    if(parts.length >= 1){
      const name = parts[0];
      if(name.toLowerCase().includes('مركب') || name.toLowerCase().includes('vessel') || name.toLowerCase().includes('eta')) return;
      const eta = parts[1] || '';
      const cargo = parts[2] || '';
      state.vessels.push({id:uid(), name, eta, cargo});
      count++;
    }
  });
  saveState(); renderTab();
  alert(`تمت إضافة ${count} مركب تلقائياً إلى البيرس بلان.`);
}

function addOtherTask(date){
  const opName = document.getElementById('otOpName').value.trim();
  const craneNum = document.getElementById('otCraneNum').value.trim();

  if(!opName || !craneNum){ alert('من فضلك اختر اسم الوناش ورقم الونش أولاً'); return; }
  
  let op = state.crew.operators.find(o => o.name.trim().toLowerCase() === opName.toLowerCase());
  if(!op){
    op = { id: uid(), name: opName, rating: 'A' };
    state.crew.operators.push(op);
  }

  const roster = getRoster(date);
  const task = { id: uid(), opId: op.id, craneNum, type };
  roster.otherTasks.push(task);
  log('روستر', 'إضافة مهمة أخرى', null, {date, task});
  saveState(); renderTab();
}

  const roster = getRoster(date);

  saveState(); renderTab();

    craneNumber: craneNumber,
    hold: hold || '-',

  saveState();
  renderTab();

/* ===================== AI ROSTER GENERATOR ===================== */
function aiGenerateRoster(date){
  try {
    if (typeof getRoster !== 'function') return;
    const roster = getRoster(date);
    if(!roster || !roster.vessels || !roster.vessels.length){ alert('أضف مركب واحد على الأقل أولاً'); return; }
    let cranes = [];
    roster.vessels.forEach(v=> v.cranes && v.cranes.forEach(c=> cranes.push(c)) );
    if(!cranes.length){ alert('أضف أوناش للمركب أولاً'); return; }

    const available = (state && state.crew && state.crew.operators) ? state.crew.operators.filter(o=>!isOnLeave(o.name,date)) : [];
    const byRating = {A:[],B:[],C:[]};
    available.forEach(o=> {
      let r = o.rating || 'A';
      if(byRating[r]) byRating[r].push(o.id || o.name);
    });
    Object.values(byRating).forEach(arr=>arr.sort(()=>Math.random()-0.5));

    cranes.forEach(c=>c.operators=[]);
    const order = ['A','B','C'];
    let ratingQueues = {A:[...byRating.A], B:[...byRating.B], C:[...byRating.C]};
    let craneIdx=0;
    let guard=0;
    while((ratingQueues.A.length||ratingQueues.B.length||ratingQueues.C.length) && guard<2000){
      guard++;
      const crane = cranes[craneIdx % cranes.length];
      let assigned=false;
      for(const r of order){
        if(ratingQueues[r].length){
          const opId = ratingQueues[r].shift();
          crane.operators.push(opId);
          assigned=true;
          break;
        }
      }
      craneIdx++;
      if(!assigned) break;
    }
    if(typeof log === 'function') log('روستر','توليد تلقائي بالذكاء الاصطناعي',null,{date, cranesCount:cranes.length});
    if(typeof saveState === 'function') saveState(); 
    if(typeof renderTab === 'function') renderTab();
    alert('تم توليد توزيع الوناشين تلقائياً بالتوازن بين التصنيفات.');
  } catch(e) {
    console.error("Error in aiGenerateRoster:", e);
  }
}

/* ===================== ROTATION CALENDAR (متوافق حتى 2050) ===================== */
function getEgyptHolidays(year){
  return {
    [`${year}-01-07`]: 'عيد الميلاد المجيد',
    [`${year}-01-25`]: 'عيد الشرطة وثورة 25 يناير',
    [`${year}-04-25`]: 'عيد تحرير سيناء',
    [`${year}-05-01`]: 'عيد العمال',
    [`${year}-06-30`]: 'ثورة 30 يونيو',
    [`${year}-07-23`]: 'ثورة 23 يوليو',
    [`${year}-10-06`]: 'عيد القوات المسلحة'
  };
}

function getShiftTypeForDate(dateObj, shiftNum) {
    if (!(dateObj instanceof Date) || isNaN(dateObj.getTime())) {
        return 'O';
    }

    const currentDate = new Date(dateObj);
    currentDate.setHours(0, 0, 0, 0);

    const dateStr = currentDate.toISOString().split("T")[0];
    const key = `${shiftNum}_${dateStr}`;

    if (
        typeof state !== "undefined" &&
        state.manualShifts &&
        state.manualShifts[key]
    ) {
        return state.manualShifts[key];
    }

    const referenceDate = new Date(2026, 6, 1);
    referenceDate.setHours(0, 0, 0, 0);

    const diffDays = Math.floor(
        (currentDate.getTime() - referenceDate.getTime()) / 86400000
    );

    const pattern = ['D', 'D', 'N', 'N', 'O', 'O', 'O', 'O'];

    const offsets = {
        1: 0, 
        2: 4, 
        3: 6, 
        4: 2  
    };

    const offset = offsets[shiftNum] ?? 0;
    let index = (diffDays + offset) % 8;

    if (index < 0) {
        index += 8;
    }

    return pattern[index];
}

function toggleManualShift(dateStr, shiftNum){
  const key = `${shiftNum}_${dateStr}`;
  const curr = getShiftTypeForDate(new Date(dateStr), shiftNum);
  let next = 'D';
  if(curr === 'D') next = 'N';
  else if(curr === 'N') next = 'O';
  else next = 'D';

  if(!state.manualShifts) state.manualShifts = {};
  state.manualShifts[key] = next;
  saveState();
  renderTab();
}

function renderMonthlyCalendar(year, month, holidays){
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysCount = lastDay.getDate();
  const monthsArabic = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  const shiftsToShow = calSelectedShift === 'all' ? [1,2,3,4] : [parseInt(calSelectedShift)];

  let html = `
  <div class="card" style="overflow-x:auto;">
    <h2 style="color:var(--gold); margin-bottom:14px; text-align:center;">تقويم شهر ${esc(monthsArabic[month])} ${year}</h2>
    <p class="muted" style="text-align:center; font-size:0.78rem; margin-bottom:10px;">اضغط على الخانة للتعديل اليدوي (نهار D ⇄ ليل N ⇄ راحة O)</p>
    <table class="cal-table">
      <thead>
        <tr>
          <th style="min-width:150px; text-align:right;">الوردية / اليوم</th>
  `;
  for(let d=1; d<=daysCount; d++){
    html += `<th>${d}</th>`;
  }
  html += `</tr></thead><tbody>`;

  shiftsToShow.forEach(sNum => {
    html += `<tr>`;
    html += `<td style="text-align:right; font-weight:bold; background:rgba(255,255,255,0.04);">
      <div>${esc(shiftNamesArabic[sNum])}</div>
      <div class="muted" style="font-size:0.7rem;">Shift ${String.fromCharCode(64+sNum)}</div>
    </td>`;

    for(let d=1; d<=daysCount; d++){
      const currDate = new Date(year, month, d);
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const code = getShiftTypeForDate(currDate, sNum);
      let cellClass = 'cal-shift-O';
      let label = 'O';
      if(code === 'D') { cellClass = 'cal-shift-D'; label = 'D'; }
      else if(code === 'N') { cellClass = 'cal-shift-N'; label = 'N'; }

      const isHol = holidays[dateStr];

      html += `<td class="${cellClass}" onclick="toggleManualShift('${esc(dateStr)}', ${sNum})" title="اضغط للتعديل اليدوي — ${esc(dateStr)}">
        <div>${esc(label)}</div>
        ${isHol ? `<div style="font-size:0.6rem; color:#ff5c5c; font-weight:bold;">★</div>` : ''}
      </td>`;
    }
    html += `</tr>`;
  });

  html += `</tbody></table>
    <div class="row" style="margin-top:14px; justify-content:center; gap:18px; font-size:0.8rem;">
      <div><span class="pill cal-shift-D" style="padding:2px 8px;">D</span> نهار</div>
      <div><span class="pill cal-shift-N" style="padding:2px 8px;">N</span> ليل</div>
      <div><span class="pill cal-shift-O" style="padding:2px 8px; background:rgba(255,255,255,0.1);">O</span> راحة</div>
      <div><span style="color:#ff5c5c; font-weight:bold;">★</span> إجازة رسمية</div>
    </div>
  </div>`;

  return html;
}

function renderWeeklyCalendar(holidays){
  const curr = new Date(calTargetDate);
  const firstOfWeek = new Date(curr);
  firstOfWeek.setDate(curr.getDate() - curr.getDay());

  let html = `<div class="card">
    <h2 style="color:var(--gold); margin-bottom:14px; text-align:center;">تفاصيل الأسبوع الحالي للورديات</h2>
    <div class="g4">`;

  for(let i=0; i<7; i++){
    const d = new Date(firstOfWeek);
    d.setDate(firstOfWeek.getDate() + i);
    const dateStr = d.toISOString().slice(0,10);
    const dayName = d.toLocaleDateString('ar-EG', {weekday:'long'});
    const hol = holidays[dateStr];
    
    html += `<div class="card" style="background:rgba(255,255,255,0.03);">
      <h3 style="font-size:0.95rem; border-bottom:1px solid var(--border); padding-bottom:6px; margin-bottom:8px;">
        ${esc(dayName)} <span class="muted" style="font-size:0.75rem; display:block;">${esc(dateStr)}</span>
      </h3>
      ${hol ? `<div class="holiday-badge">★ ${esc(hol)}</div>` : ''}
      <div style="display:flex; flex-direction:column; gap:6px; margin-top:8px;">`;

    const shiftsToCheck = calSelectedShift === 'all' ? [1, 2, 3, 4] : [parseInt(calSelectedShift)];
    shiftsToCheck.forEach(sNum => {
      const code = getShiftTypeForDate(d, sNum);
      const bg = code === 'D' ? 'rgba(30,136,229,0.2)' : (code === 'N' ? 'rgba(94,53,177,0.2)' : 'rgba(255,255,255,0.03)');
      const color = code === 'D' ? 'var(--ok)' : (code === 'N' ? 'var(--gold)' : 'var(--cream)');
      const txt = code === 'D' ? 'نهار (D)' : (code === 'N' ? 'ليل (N)' : 'راحة (O)');

      html += `<div style="display:flex; justify-content:space-between; padding:5px 8px; background:${bg}; border-radius:8px; font-size:0.82rem; cursor:pointer;" onclick="toggleManualShift('${esc(dateStr)}', ${sNum})" title="اضغط للتعديل اليدوي">
        <span><b>${esc(shiftNamesArabic[sNum])}</b></span>
        <span style="color:${color}; font-weight:bold;">${esc(txt)}</span>
      </div>`;
    });

    html += `</div></div>`;
  }
  html += `</div></div>`;
  return html;
}

function renderDailyCalendar(holidays){
  const dStr = calTargetDate.toISOString().slice(0,10);
  const hol = holidays[dStr];

  let dayShifts = {D:[], N:[], O:[]};
  for(let s=1; s<=4; s++){
    const code = getShiftTypeForDate(calTargetDate, s);
    if(code==='D') dayShifts.D.push(s);
    else if(code==='N') dayShifts.N.push(s);
    else dayShifts.O.push(s);
  }

  return `
  <div class="card" style="max-width:700px; margin:0 auto;">
    <h2 style="color:var(--gold); text-align:center; margin-bottom:6px;">بطاقة الوردية اليومية</h2>
    <div style="text-align:center; margin-bottom:16px;" class="muted">التاريخ: ${esc(dStr)} (${esc(calTargetDate.toLocaleDateString('ar-EG',{weekday:'long'}))})</div>
    
    ${hol ? `<div class="notice" style="text-align:center; margin-bottom:14px; font-weight:bold; color:var(--danger);">★ إجازة رسمية / مناسبة: ${esc(hol)}</div>` : ''}

    <div style="display:flex; flex-direction:column; gap:12px;">
      <div class="card" style="background:rgba(30,136,229,0.1); border-color:rgba(30,136,229,0.3);">
        <h3 style="color:#64b5f6; margin-bottom:6px;">☀️ الخدمة النهارية (Day Shift)</h3>
        <div>${dayShifts.D.length ? dayShifts.D.map(s=>`<b>${esc(shiftNamesArabic[s])}</b>`).join(' & ') : 'لا توجد وردية نهارية'}</div>
      </div>

      <div class="card" style="background:rgba(94,53,177,0.1); border-color:rgba(94,53,177,0.3);">
        <h3 style="color:#b388ff; margin-bottom:6px;">🌙 الخدمة الليلية (Night Shift)</h3>
        <div>${dayShifts.N.length ? dayShifts.N.map(s=>`<b>${esc(shiftNamesArabic[s])}</b>`).join(' & ') : 'لا توجد وردية ليلية'}</div>
      </div>

      <div class="card" style="background:rgba(255,255,255,0.03);">
        <h3 style="color:var(--cream); margin-bottom:6px;">🛌 الورديات في الراحة (Off)</h3>
        <div>${dayShifts.O.length ? dayShifts.O.map(s=>`<span class="chip">${esc(shiftNamesArabic[s])}</span>`).join(' ') : 'لا توجد ورديات في الراحة'}</div>
      </div>
    </div>
  </div>`;
}

function renderYearlyCalendar(year, holidays){
  const monthsArabic = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const shiftsToShow = calSelectedShift === 'all' ? [1,2,3,4] : [parseInt(calSelectedShift)];

  return `
  <div class="card">
    <h2 style="color:var(--gold); text-align:center; margin-bottom:16px;">ملخص وتوزيع الخدمة السنوي (${year})</h2>
    <div class="g2">
      ${monthsArabic.map((mName, mIdx)=>{
        const lastD = new Date(year, mIdx+1, 0).getDate();
        let workDaysCount = 0;
        for(let d=1; d<=lastD; d++){
          const dt = new Date(year, mIdx, d);
          shiftsToShow.forEach(s => {
            if(getShiftTypeForDate(dt, s) !== 'O') workDaysCount++;
          });
        }
        return `
          <div class="card" style="background:rgba(255,255,255,0.03);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
              <b>شهر ${esc(mName)}</b>

            <div class="muted" style="font-size:0.8rem;">إجمالي الأيام: ${lastD} يوم</div>
          </div>
        `;
      }).join('')}
    </div>
  </div>`;
}

/* ===================== EXPORT SHARE AS IMAGE ===================== */
function shareElement(elementId, filename, bgOverride){
  const el = document.getElementById(elementId);
  if(!el){ alert('عنصر التصدير غير موجود'); return; }
  
  const originalBackground = el.style.background;
  if(bgOverride) el.style.background = bgOverride;

  const originalWidth = el.style.width;
  const originalMaxWidth = el.style.maxWidth;
  el.style.width = '1200px';
  el.style.maxWidth = 'none';

  html2canvas(el, {scale:2, useCORS:true, backgroundColor: bgOverride || null, windowWidth: 1400}).then(canvas=>{
    el.style.background = originalBackground;
    el.style.width = originalWidth;
    el.style.maxWidth = originalMaxWidth;
    
    canvas.toBlob(blob=>{
      if(!blob){ alert('تعذر توليد الصورة'); return; }
      const file = new File([blob], filename, {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file], title:'Roster Report', text:'مشاركة تقرير الروستر'}).catch(err=>{
          if(err.name !== 'AbortError') downloadCanvas(canvas, filename);
        });
      } else {
        downloadCanvas(canvas, filename);
      }
    });
  }).catch(err=>{
    el.style.background = originalBackground;
    el.style.width = originalWidth;
    el.style.maxWidth = originalMaxWidth;
    console.error(err);
    alert('حدث خطأ أثناء تصدير الصورة');
  });
}
function downloadCanvas(canvas, filename){
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
  link.remove();
}
function shareCurrent(){

}

function toggleAI(){
  const panel = document.getElementById('aiPanel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open') && !aiHistory.length){
    appendAIMsg('bot', 'أهلاً بك! أنا مساعدك الذكي لنظام Roster. يمكنك سؤالي عن توزيع الوناشين، تغطية الورديات، أو تحليل الأداء.');
  }
}
function appendAIMsg(sender, text){
  aiHistory.push({sender, text});
  const msgs = document.getElementById('aiMsgs');
  if(!msgs) return;
  msgs.innerHTML = aiHistory.map(m=>`<div class="ai-msg ${m.sender}">${esc(m.text)}</div>`).join('');
  msgs.scrollTop = msgs.scrollHeight;
}
async function sendAI(){
  const input = document.getElementById('aiInput');
  const q = input.value.trim();
  if(!q) return;
  input.value = '';
  appendAIMsg('user', q);

  if(!state.geminiApiKey){
    appendAIMsg('bot', 'يرجى إدخال مفتاح Gemini API في صفحة الإعدادات أولاً لتفعيل المحادثة الذكية.');
    return;
  }

  try{
    const summaryData = `اسم المستخدم: ${state.name}, الوردية: ${state.shiftName}, عدد الوناشين: ${state.crew.operators.length}, عدد المراكب: ${state.vessels.length}`;
    const sys = "أنت مساعد ذكي ومحترف لنظام إدارة الموانئ والروستر (Roster). أجب باختصار واحترانية باللغة العربية بناءً على سياق الموانئ و بيانات النظام.";
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",
      {
        method:"POST",
        headers:{"Content-Type":"application/json","x-goog-api-key":state.geminiApiKey},
        body: JSON.stringify({
          systemInstruction:{ parts:[{text:sys}] },
          contents:[{ parts:[{text:`سياق النظام الحالي: ${summaryData}\n\nسؤال المستخدم: ${q}`}] }]
        })
      }
    );
    const data = await response.json();
    if(!response.ok) throw new Error(data.error?.message || 'HTTP error');
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'عذراً، لم أستطع الرد.';
    appendAIMsg('bot', reply);
  }catch(err){
    console.error(err);
    appendAIMsg('bot', 'حدث خطأ في الاتصال بالذكاء الاصطناعي: ' + err.message);
  }
}

/* ===================== BIND EVENTS ===================== */
function bindTabEvents(){
  if(currentTab==='reports') bindReportsSearch();
}

function esc(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

  checkAutoLogin();
  render();
};
