<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#08080A;
  --gold:#FFD60A;
  --gold-dim:#B8981F;
  --cream:#F5F5F7;
  --glass:rgba(255,255,255,0.055);
  --glass-strong:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.10);
  --danger:#FF5C5C;
  --ok:#3DDC84;
  --warn:#FFB020;
  --radius:20px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(circle at 15% 0%, rgba(255,214,10,0.06), transparent 40%),
    radial-gradient(circle at 100% 20%, rgba(255,255,255,0.05), transparent 35%),
    radial-gradient(circle at 0% 100%, rgba(255,214,10,0.04), transparent 40%),
    var(--bg);
  color:var(--cream);
  font-family:"SF Arabic","Segoe UI",system-ui,-apple-system,Tahoma,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.glass{
  background:var(--glass);
  backdrop-filter:blur(50px) saturate(260%);
  -webkit-backdrop-filter:blur(50px) saturate(260%);
  border:1px solid var(--border);
}
.card{
  background:var(--glass);
  backdrop-filter:blur(50px) saturate(260%);
  -webkit-backdrop-filter:blur(50px) saturate(260%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
}
h1,h2,h3{font-weight:700;margin:0 0 10px 0;}
h1{color:var(--gold);font-size:1.4rem;letter-spacing:.3px;}
h2{font-size:1.15rem;color:var(--cream);}
h3{font-size:1rem;color:var(--gold);}
label{display:block;font-size:.8rem;color:#c8c8cf;margin-bottom:6px;}
input,select,textarea{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--cream);
  border-radius:14px;
  padding:11px 13px;
  font-size:.92rem;
  font-family:inherit;
  transition:box-shadow .18s cubic-bezier(.175,.885,.32,1.275), transform .18s cubic-bezier(.175,.885,.32,1.275), border-color .18s;
  outline:none;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(255,214,10,0.6);
  box-shadow:0 0 0 4px rgba(255,214,10,0.15);
  transform:scale(1.015);
}
textarea{resize:vertical;min-height:70px;}
.field{margin-bottom:12px;}
button{
  font-family:inherit;
  cursor:pointer;
  border:none;
  border-radius:14px;
  padding:11px 18px;
  font-size:.9rem;
  font-weight:600;
  transition:transform .18s cubic-bezier(.175,.885,.32,1.275), box-shadow .18s;
}
button:active{transform:scale(.96);}
.btn-gold{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#141406;}
.btn-gold:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 22px rgba(255,214,10,0.25);}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--cream);border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-danger{background:rgba(255,92,92,0.15);color:var(--danger);border:1px solid rgba(255,92,92,0.3);}
.btn-sm{padding:7px 12px;font-size:.78rem;border-radius:10px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr;}}
#app{max-width:1100px;margin:0 auto;padding:20px 16px 90px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;margin-bottom:18px;border-radius:22px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold);}
.brand span{font-weight:800;font-size:1.25rem;letter-spacing:1px;color:var(--gold);}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.tab{padding:9px 16px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);font-size:.85rem;cursor:pointer;color:#d8d8de;}
.tab.active{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#141406;font-weight:700;border-color:transparent;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:100px;font-size:.72rem;font-weight:700;}
.pill-A{background:rgba(61,220,132,0.16);color:var(--ok);}
.pill-B{background:rgba(255,176,32,0.16);color:var(--warn);}
.pill-C{background:rgba(255,92,92,0.16);color:var(--danger);}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:14px;background:rgba(255,255,255,0.035);border:1px solid var(--border);margin-bottom:8px;}
.muted{color:#9a9aa2;font-size:.8rem;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.notice{background:rgba(255,214,10,0.06);border:1px solid rgba(255,214,10,0.25);border-radius:14px;padding:10px 14px;font-size:.78rem;color:#e8d998;margin-top:8px;}
table{width:100%;border-collapse:collapse;font-size:.85rem;}
th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--border);}
th{color:var(--gold);font-weight:700;}
.crane-block{border:1px solid var(--border);border-radius:16px;padding:14px;margin-top:12px;background:rgba(255,255,255,0.03);}
.chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:100px;padding:5px 12px;font-size:.78rem;margin:3px;}
.chip button{background:none;border:none;color:var(--danger);padding:0;font-size:.8rem;}
.empty{text-align:center;padding:30px;color:#8b8b93;}
.login-wrap{min-height:90vh;display:flex;align-items:center;justify-content:center;}
.login-card{max-width:420px;width:100%;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,214,10,.3);border-top-color:var(--gold);border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tbt-box{border:1.5px solid rgba(255,214,10,0.4);border-radius:18px;padding:16px;margin-bottom:16px;background:rgba(255,214,10,0.04);}
.ai-panel{position:fixed;left:16px;bottom:16px;width:min(360px,90vw);max-height:70vh;display:none;flex-direction:column;z-index:50;border-radius:22px;overflow:hidden;}
.ai-panel.open{display:flex;}
.ai-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.ai-msg{padding:9px 12px;border-radius:14px;font-size:.82rem;max-width:85%;}
.ai-msg.user{align-self:flex-start;background:rgba(255,214,10,0.14);}
.ai-msg.bot{align-self:flex-end;background:rgba(255,255,255,0.06);}
.ai-fab{position:fixed;left:16px;bottom:16px;z-index:49;border-radius:100px;padding:13px 20px;display:flex;align-items:center;gap:8px;}
.audit{font-size:.75rem;color:#9a9aa2;}
.audit b{color:var(--cream);}

/* Classic printable roster table — matches the reference sheet look */
.rt-table{width:100%;border-collapse:collapse;background:#fff;color:#111;font-family:Arial,"SF Arabic",sans-serif;font-size:.95rem;}
.rt-table th,.rt-table td{border:1.5px solid #000;padding:8px 10px;text-align:center;}
.rt-table thead tr:first-child th.rt-title{background:#1f3b57;color:#fff;font-size:1.15rem;font-weight:800;letter-spacing:.5px;}
.rt-table thead tr:first-child th.rt-team{background:#1f3b57;color:#fff;font-size:.9rem;}
.rt-table thead tr:nth-child(2) th{background:#7f8fa4;color:#fff;font-weight:700;}
.rt-table .rt-en{font-weight:400;font-size:.8rem;}
.rt-table tbody td{background:#c9d2da;font-weight:600;}
.rt-table tbody tr:nth-child(even) td{background:#dfe5ea;}
.rt-table td.rt-team{background:#b9c3cd;font-weight:700;}
.rt-table td.rt-op{font-weight:700;}
.rt-table td.rt-crane{font-weight:800;color:#155724;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:rgba(255,214,10,0.3);border-radius:10px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="ai-fab glass" id="aiFab" onclick="toggleAI()">🤖 <span>المساعد الذكي</span></div>
<div class="ai-panel glass" id="aiPanel">
  <div class="ai-header">
    <b style="color:var(--gold)">مساعد الروستر الذكي</b>
    <button class="btn-ghost btn-sm" onclick="toggleAI()">إغلاق</button>
  </div>
  <div class="ai-msgs" id="aiMsgs"></div>
  <div style="padding:10px;border-top:1px solid var(--border);display:flex;gap:8px;">
    <input id="aiInput" placeholder="اسأل عن نقص الطاقم، التوازن، التنبؤات..." onkeydown="if(event.key==='Enter')sendAI()">
    <button class="btn-gold btn-sm" onclick="sendAI()">إرسال</button>
  </div>
</div>

<script>
/* ===================== STATE & STORAGE ===================== */
let state = null;
let currentTab = 'crew';
let aiHistory = [];

// --- دالة استقبال البيانات من فلاتر ---
window.onNativeDataReceived = function(data) {
  const email = document.getElementById('loginEmail') ? document.getElementById('loginEmail').value.trim() : (state ? state.email : '');
  const name = document.getElementById('loginName') ? document.getElementById('loginName').value.trim() : (state ? state.name : '');

  if(data && data.trim().length > 0 && data !== "null") {
    try {
      state = JSON.parse(data);
      if (name) state.name = name; 
    } catch(e) {
      state = blankState(email, name);
    }
  } else {
    state = blankState(email, name);
    saveState();
  }
  render();
};

function keyFor(email){
  return 'roster_app:' + (email||'').toLowerCase().trim().replace(/[^a-z0-9.]/g,'_');
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function nowStr(){ const d=new Date(); return d.toLocaleString('ar-EG'); }

function blankState(email,name){
  return {
    email, name, shiftName:'الوردية الأولى',
    crew:{ operators:[], loaders:[], forklifts:[], other:[] },
    vessels:[],
    leaves:[],
    handovers:[],
    rosterDates:{},
    logs:[],
    geminiApiKey:''
  };
}

async function saveState(){
  try{
    const key = keyFor(state.email);
    const dataStr = JSON.stringify(state);
    
    // أولاً: الحفظ في متصفح الويب (عشان سفاري وكروم والكمبيوتر)
    localStorage.setItem(key, dataStr);
    localStorage.setItem('roster_current_user_email', state.email);
    localStorage.setItem('roster_current_user_name', state.name);

    // ثانياً: الحفظ في الموبايل لو متصل بـ فلاتر
    if (window.NativeStorage) {
        window.NativeStorage.postMessage('set:::' + key + ':::' + dataStr);
    }
  }catch(e){ console.error('save failed', e); }
}

function log(entity, action, before, after){
  state.logs.unshift({id:uid(), ts:nowStr(), entity, action, before, after, user:state.name});
  if(state.logs.length>500) state.logs.length=500;
}

/* ===================== LOGIN ===================== */
async function tryLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const name = document.getElementById('loginName').value.trim();
  if(!email || !name){ alert('من فضلك ادخل الاسم والإيميل'); return; }
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span> جاري التحميل...';
  
  const key = keyFor(email);

  try{
    if (window.NativeStorage) {
      // إرسال طلب جلب البيانات لفلاتر
      window.NativeStorage.postMessage('get:::' + key);
    } else {
      // Fallback: جلب البيانات من LocalStorage المتصفح مباشرة
      const localData = localStorage.getItem(key);
      if(localData) {
        state = JSON.parse(localData);
        if(name) state.name = name; // تحديث الاسم لو اتغير
      } else {
        state = blankState(email, name);
        saveState();
      }
      render();
    }
  }catch(e){
    state = blankState(email, name);
    saveState();
    render();
  }
}

// دالة فحص تسجيل الدخول التلقائي عند فتح المتصفح
function checkAutoLogin() {
  try {
    const savedEmail = localStorage.getItem('roster_current_user_email');
    const savedName = localStorage.getItem('roster_current_user_name');
    if(savedEmail && savedName) {
      const key = keyFor(savedEmail);
      const localData = localStorage.getItem(key);
      if(localData) {
        state = JSON.parse(localData);
        render();
      }
    }
  } catch(e) { console.error("Auto login failed", e); }
}

async function saveState(){
  try{
    if (state && state.email) {
      localStorage.setItem(keyFor(state.email), JSON.stringify(state));
    }
    if (window.NativeStorage) {
        window.NativeStorage.postMessage('set:::' + keyFor(state.email) + ':::' + JSON.stringify(state));
    }
  }catch(e){ console.error('save failed', e); }
}
function log(entity, action, before, after){
  state.logs.unshift({id:uid(), ts:nowStr(), entity, action, before, after, user:state.name});
  if(state.logs.length>500) state.logs.length=500;
}

/* ===================== LOGIN ===================== */
async function tryLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const name = document.getElementById('loginName').value.trim();
  if(!email || !name){ alert('من فضلك ادخل الاسم والإيميل'); return; }
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span> جاري التحميل...';
  
  try{
    if (window.NativeStorage) {
      window.NativeStorage.postMessage('get:::' + keyFor(email));
    } else {
      state = loadLocalBackup(email, name);
      render();
    }
  }catch(e){
    state = loadLocalBackup(email, name);
    saveState();
    render();
  }
}

function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="login-wrap">
    <div class="card login-card">
      <div class="brand" style="margin-bottom:18px;justify-content:center;">
        <div class="dot"></div><span>ROSTER</span>
      </div>
      <h2 style="text-align:center;color:var(--cream);font-weight:400;margin-bottom:20px;">تسجيل الدخول لحفظ ومزامنة بياناتك</h2>
      <div class="field"><label>الاسم</label><input id="loginName" placeholder="اسمك"></div>
      <div class="field"><label>البريد الإلكتروني</label><input id="loginEmail" placeholder="example@mail.com" type="email"></div>
      <button class="btn-gold" style="width:100%;margin-top:6px;" id="loginBtn" onclick="tryLogin()">دخول</button>
      <p class="muted" style="text-align:center;margin-top:14px;">استخدم نفس الإيميل من أي جهاز لاسترجاع بياناتك المحفوظة.</p>
    </div>
  </div>`;
}

/* ===================== SHELL / TABS ===================== */
const TABS = [
  {id:'crew', label:'الطاقم'},
  {id:'pier', label:'بيرس بلان'},
  {id:'roster', label:'الروستر'},
  {id:'leaves', label:'الإجازات'},
  {id:'handover', label:'التسليم والتسلم'},
  {id:'reports', label:'التقارير'},
  {id:'settings', label:'الإعدادات'},
];

function render(){
  if(!state){ renderLogin(); return; }
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar glass">
      <div class="brand"><div class="dot"></div><span>ROSTER</span></div>
      <div class="row">
        <span class="muted">${state.name} · ${state.shiftName}</span>
        <button class="btn-ghost btn-sm" onclick="shareCurrent()">📤 مشاركة كصورة</button>
      </div>
    </div>
    <div class="tabs">
      ${TABS.map(t=>`<div class="tab ${currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</div>`).join('')}
    </div>
    <div id="tabContent"></div>
  `;
  renderTab();
}
function switchTab(id){ currentTab=id; render(); }
function renderTab(){
  const c = document.getElementById('tabContent');
  if(currentTab==='crew') c.innerHTML = viewCrew();
  else if(currentTab==='pier') c.innerHTML = viewPier();
  else if(currentTab==='roster') c.innerHTML = viewRoster();
  else if(currentTab==='leaves') c.innerHTML = viewLeaves();
  else if(currentTab==='handover') c.innerHTML = viewHandover();
  else if(currentTab==='reports') c.innerHTML = viewReports();
  else if(currentTab==='settings') c.innerHTML = viewSettings();
  bindTabEvents();
}

/* ===================== CREW ===================== */
function viewCrew(){
  return `
  <div id="captureArea">
  <h1>الطاقم</h1>
  <div class="g3">
    <div class="card">
      <h3>طاقم الوناشين</h3>
      <div id="opList">${renderOperators()}</div>
      <div class="divider"></div>
      <div class="field"><label>اسم الونّاش</label><input id="opName" placeholder="اكتب الاسم"></div>
      <div class="field"><label>التصنيف (يظهر لك فقط)</label>
        <select id="opRating"><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
      </div>
      <button class="btn-gold" style="width:100%" onclick="addOperator()">إضافة ونّاش</button>
    </div>
    <div class="card">
      <h3>معدات - لوادر (Loaders)</h3>
      <div id="loaderList">${renderEquipList('loaders')}</div>
      <div class="divider"></div>
      <div class="field"><label>رقم اللودر</label><input id="loaderNum" placeholder="مثال: L-12"></div>
      <button class="btn-gold" style="width:100%" onclick="addEquip('loaders','loaderNum')">إضافة لودر</button>
    </div>
    <div class="card">
      <h3>معدات - شوكة (Forklifts)</h3>
      <div id="forkList">${renderEquipList('forklifts')}</div>
      <div class="divider"></div>
      <div class="field"><label>رقم الشوكة</label><input id="forkNum" placeholder="مثال: F-05"></div>
      <button class="btn-gold" style="width:100%" onclick="addEquip('forklifts','forkNum')">إضافة شوكة</button>
    </div>
  </div>
  </div>`;
}
function renderOperators(){
  if(!state.crew.operators.length) return `<div class="empty muted">لا يوجد ونّاشين بعد</div>`;
  return state.crew.operators.map(o=>`
    <div class="list-item">
      <div class="row">
        <span class="pill pill-${o.rating}">${o.rating}</span>
        <b>${esc(o.name)}</b>
        ${isOnLeaveToday(o.name)?'<span class="muted">(في إجازة اليوم)</span>':''}
      </div>
      <div class="row">
        <button class="btn-ghost btn-sm" onclick="editOperator('${o.id}')">تعديل</button>
        <button class="btn-danger btn-sm" onclick="deleteOperator('${o.id}')">حذف</button>
      </div>
    </div>`).join('');
}
function renderEquipList(kind){
  const arr = state.crew[kind];
  if(!arr.length) return `<div class="empty muted">لا توجد معدات مضافة</div>`;
  return arr.map(e=>`
    <div class="list-item">
      <b>${esc(e.number)}</b>
      <div class="row">
        <button class="btn-ghost btn-sm" onclick="editEquip('${kind}','${e.id}')">تعديل</button>
        <button class="btn-danger btn-sm" onclick="deleteEquip('${kind}','${e.id}')">حذف</button>
      </div>
    </div>`).join('');
}
function addOperator(){
  const name = document.getElementById('opName').value.trim();
  const rating = document.getElementById('opRating').value;
  if(!name) return;
  const o = {id:uid(), name, rating};
  state.crew.operators.push(o);
  log('ونّاش','إضافة',null,o);
  saveState(); renderTab();
}
function editOperator(id){
  const o = state.crew.operators.find(x=>x.id===id); if(!o) return;
  const name = prompt('اسم الونّاش', o.name); if(name===null) return;
  const rating = prompt('التصنيف (A/B/C)', o.rating); if(rating===null) return;
  const before = {...o};
  o.name=name.trim()||o.name;
  if(['A','B','C'].includes(rating.trim().toUpperCase())) o.rating=rating.trim().toUpperCase();
  log('ونّاش','تعديل',before,o);
  saveState(); renderTab();
}
function deleteOperator(id){
  const o = state.crew.operators.find(x=>x.id===id);
  if(!confirm('حذف هذا الونّاش؟')) return;
  state.crew.operators = state.crew.operators.filter(x=>x.id!==id);
  log('ونّاش','حذف',o,null);
  saveState(); renderTab();
}
function addEquip(kind, inputId){
  const number = document.getElementById(inputId).value.trim();
  if(!number) return;
  const e = {id:uid(), number};
  state.crew[kind].push(e);
  log(kind==='loaders'?'لودر':'شوكة','إضافة',null,e);
  saveState(); renderTab();
}
function editEquip(kind,id){
  const arr = state.crew[kind];
  const e = arr.find(x=>x.id===id); if(!e) return;
  const number = prompt('رقم المعدة', e.number); if(number===null) return;
  const before={...e};
  e.number = number.trim()||e.number;
  log(kind,'تعديل',before,e);
  saveState(); renderTab();
}
function deleteEquip(kind,id){
  const arr = state.crew[kind];
  const e = arr.find(x=>x.id===id);
  if(!confirm('حذف هذه المعدة؟')) return;

/* ----- دالات التحكم في المهام الأخرى ----- */
function addOtherTask(date){

function deleteOtherTask(date, taskId){
  const roster = getRoster(date);

  saveState(); renderTab();
}
function renderOtherTasksList(date){
  const roster = getRoster(date);

function addVesselToRoster(date){
  const roster = getRoster(date);

  let name;
  if(pick){ name = state.vessels.find(v=>v.id===pick).name; }

function removeVesselFromRoster(date,vId){

}
function addCrane(date,vId){
  const roster = getRoster(date);
  const rv = roster.vessels.find(v=>v.id===vId);
  const craneNumber = prompt('رقم الونش (Crane):', '');

  const hold = prompt('رقم/اسم العنبر (Hold):', '');

  rv.cranes.push({id:uid(), craneNumber: craneNumber.trim()||'-', hold: hold.trim()||'-', operators:[], equipment:[]});

}
function updateCraneField(date,vId,crId,field,value){
  const roster = getRoster(date);
  const cr = roster.vessels.find(v=>v.id===vId).cranes.find(c=>c.id===crId);
  const before = {...cr};
  cr[field] = value.trim()||'-';
  log('روستر','تعديل بيانات الونش',before,cr);
  saveState(); renderTab();
}
function renderCrane(date,vId,cr){

          <label>رقم العنبر (Hold)</label>

      </div>
      <button class="btn-danger btn-sm" onclick="removeCrane('${date}','${vId}','${cr.id}')">حذف الونش</button>
    </div>
    <div style="margin:10px 0;">
      <label>الوناشين المعينين</label>
      <div>${cr.operators.map(oid=>{
        const op = state.crew.operators.find(o=>o.id===oid);
        return op? `<span class="chip">${esc(op.name)} <button onclick="unassignOperator('${date}','${vId}','${cr.id}','${oid}')">✕</button></span>` : '';
      }).join('') || '<span class="muted">لا يوجد</span>'}</div>
      <select onchange="assignOperator('${date}','${vId}','${cr.id}', this.value); this.value=''">
        <option value="">+ إضافة ونّاش</option>
        ${availableOps.filter(o=>!cr.operators.includes(o.id)).map(o=>`<option value="${o.id}" ${usedIds.has(o.id)?'disabled':''}>${esc(o.name)} ${usedIds.has(o.id)?'(معيّن بالفعل)':''}</option>`).join('')}
      </select>
    </div>
    <div style="margin:10px 0;">
      <label>المعدات المخصصة</label>
      <div>${cr.equipment.map((eq,i)=>`<span class="chip">${esc(eq.label)} <button onclick="removeEquipFromCrane('${date}','${vId}','${cr.id}',${i})">✕</button></span>`).join('') || '<span class="muted">لا يوجد</span>'}</div>
      <div class="row">
        <select id="eqSel-${cr.id}">
          <option value="">-- اختر معدة --</option>
          ${state.crew.loaders.map(l=>`<option value="loader:${l.id}:${esc(l.number)}">لودر ${esc(l.number)}</option>`).join('')}
          ${state.crew.forklifts.map(f=>`<option value="fork:${f.id}:${esc(f.number)}">شوكة ${esc(f.number)}</option>`).join('')}

        <button class="btn-ghost btn-sm" onclick="assignEquipFromSelect('${date}','${vId}','${cr.id}')">إضافة</button>
      </div>
      <div class="row" style="margin-top:6px;">
        <input id="eqManual-${cr.id}" placeholder="معدة أخرى (إدخال يدوي مؤقت)">
        <button class="btn-ghost btn-sm" onclick="assignManualEquip('${date}','${vId}','${cr.id}')">إضافة</button>
      </div>
    </div>
  </div>`;
}
function removeCrane(date,vId,crId){

  if(!confirm('حذف هذا الونش من التخطيط؟')) return;

/* ----- Classic printable roster table (matches the reference sheet layout) ----- */
function buildRosterTableHTML(date){
  const roster = getRoster(date);
  const rows = [];
  
  roster.vessels.forEach(rv=>{
    rv.cranes.forEach(cr=>{
      const loaderTxt = cr.equipment.filter(e=>e.type==='loader').map(e=>e.label.replace('لودر ','')).join(' / ') || '-';
      const opsTxt = cr.operators.map(oid=>{
        const op = state.crew.operators.find(o=>o.id===oid);
        return op? op.name : null;
      }).filter(Boolean).join(' - ') || '-';
      rows.push({
        vessel: rv.name,
        loader: loaderTxt,
        hold: cr.hold||'-',
        ops: opsTxt,
        crane: cr.craneNumber||'-'
      });
    });
  });

  // إضافة المهام الأخرى لجدول الطباعة
  if(roster.otherTasks) {
    roster.otherTasks.forEach(t => {
      const op = state.crew.operators.find(o => o.id === t.opId);
      rows.push({
        vessel: `[${t.type}]`,
        loader: '-',
        hold: '-',
        ops: op ? op.name : '-',
        crane: t.craneNum
      });
    });
  }

  if(!rows.length){
    return `<div class="empty muted" id="rosterTableCapture">لا توجد بيانات كافية لعرض الجدول بعد (أضف ونش واحد أو مهمة على الأقل)</div>`;
  }

  const teamLabel = esc(state.shiftName||'');
  return `
  <div style="overflow-x:auto;border-radius:10px;">
    <table class="rt-table" id="rosterTableCapture">
      <thead>
        <tr>
          <th class="rt-team" rowspan="2">تقسيمة الوناشة</th>
          <th class="rt-title" colspan="5">Crane Operator Shift Roster</th>
        </tr>
        <tr>
          <th>المركب / المهمة<br><span class="rt-en">Vessel / Task</span></th>
          <th>Loader</th>
          <th>Hold</th>
          <th>Crane Operator</th>
          <th>Crane</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((r,i)=>`
          <tr>
            ${i===0? `<td class="rt-team" rowspan="${rows.length}">${teamLabel}</td>` : ''}
            <td>${esc(r.vessel)}</td>
            <td>${esc(r.loader)}</td>
            <td>${esc(r.hold)}</td>
            <td class="rt-op">${esc(r.ops)}</td>
            <td class="rt-crane">${esc(r.crane)}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}
function shareRosterTable(date){
  const el = document.getElementById('rosterTableCapture');
  if(!el){ alert('أضف بيانات الروستر أولاً قبل المشاركة'); return; }
  html2canvas(el, {
    backgroundColor:'#ffffff',
    scale:2,
    useCORS:true,
    width: el.scrollWidth,
    height: el.scrollHeight,
    windowWidth: el.scrollWidth,
    windowHeight: el.scrollHeight
  }).then(canvas=>{
    canvas.toBlob(blob=>{
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `roster_table_${date}.png`;
      a.click();
      URL.revokeObjectURL(url);
    });
  });
}
function assignOperator(date,vId,crId,opId){
  if(!opId) return;
  const roster = getRoster(date);
  const cr = roster.vessels.find(v=>v.id===vId).cranes.find(c=>c.id===crId);
  if(!cr.operators.includes(opId)) cr.operators.push(opId);
  saveState(); renderTab();
}
function unassignOperator(date,vId,crId,opId){
  const roster = getRoster(date);
  const cr = roster.vessels.find(v=>v.id===vId).cranes.find(c=>c.id===crId);
  cr.operators = cr.operators.filter(x=>x!==opId);
  saveState(); renderTab();
}
function assignEquipFromSelect(date,vId,crId){
  const sel = document.getElementById(`eqSel-${crId}`);
  const val = sel.value;
  if(!val) return;
  const [type,id,number] = val.split(':');
  const roster = getRoster(date);
  const cr = roster.vessels.find(v=>v.id===vId).cranes.find(c=>c.id===crId);
  cr.equipment.push({label:(type==='loader'?'لودر ':'شوكة ')+number, refId:id, type});
  saveState(); renderTab();
}
function assignManualEquip(date,vId,crId){
  const inp = document.getElementById(`eqManual-${crId}`);
  const val = inp.value.trim();
  if(!val) return;
  const roster = getRoster(date);
  const cr = roster.vessels.find(v=>v.id===vId).cranes.find(c=>c.id===crId);
  cr.equipment.push({label: val+' (مؤقت)', refId:null, type:'manual'});
  saveState(); renderTab();
}
function removeEquipFromCrane(date,vId,crId,idx){
  const roster = getRoster(date);
  const cr = roster.vessels.find(v=>v.id===vId).cranes.find(c=>c.id===crId);
  cr.equipment.splice(idx,1);
  saveState(); renderTab();
}

function aiGenerateRoster(date){
  const roster = getRoster(date);
  if(!roster.vessels.length){ alert('أضف مركب واحد على الأقل أولاً'); return; }
  let cranes = [];
  roster.vessels.forEach(v=> v.cranes.forEach(c=> cranes.push(c)) );
  if(!cranes.length){ alert('أضف أوناش للمركب أولاً (عنبر واحد على الأقل لكل ونش)'); return; }

  const available = state.crew.operators.filter(o=>!isOnLeave(o.name,date));
  const byRating = {A:[],B:[],C:[]};
  available.forEach(o=> byRating[o.rating] && byRating[o.rating].push(o.id) );
  Object.values(byRating).forEach(arr=>arr.sort(()=>Math.random()-0.5));

  cranes.forEach(c=>c.operators=[]);
  const order = ['A','B','C'];
  let ratingQueues = {A:[...byRating.A], B:[...byRating.B], C:[...byRating.C]};
  let craneIdx=0;
  let guard=0;
  while((ratingQueues.A.length||ratingQueues.B.length||ratingQueues.C.length) && guard<2000){
    guard++;
    const crane = cranes[craneIdx % cranes.length];
    let assigned=false;
    for(const r of order){
      if(ratingQueues[r].length){
        const opId = ratingQueues[r].shift();
        crane.operators.push(opId);
        assigned=true;
        break;
      }
    }
    craneIdx++;
    if(!assigned) break;
  }
  log('روستر','توليد تلقائي بالذكاء الاصطناعي',null,{date, cranesCount:cranes.length});
  saveState(); renderTab();
  alert('تم توليد توزيع الوناشين تلقائياً بالتوازن بين التصنيفات. يمكنك التعديل يدوياً الآن.');
}

function bindReportsSearch(){
  const q = (document.getElementById('searchQ')?.value||'').trim().toLowerCase();
  const container = document.getElementById('reportResults');
  if(!container) return;
  let logsToShow = state.logs;
  if(q){
    logsToShow = state.logs.filter(l=>{
      const hay = JSON.stringify(l).toLowerCase();
      return hay.includes(q);
    });
  }
  if(!logsToShow.length){
    container.innerHTML = `<div class="empty muted">${q?'لا توجد نتائج مطابقة':'لا توجد سجلات بعد'}</div>`;
    return;
  }
  container.innerHTML = `
    <table>
      <thead><tr><th>الوقت</th><th>العنصر</th><th>الإجراء</th><th>بواسطة</th><th>التفاصيل</th></tr></thead>
      <tbody>
        ${logsToShow.slice(0,200).map(l=>`
          <tr>
            <td class="muted">${l.ts}</td>
            <td>${esc(l.entity)}</td>
            <td>${esc(l.action)}</td>
            <td>${esc(l.user||'-')}</td>
            <td class="audit">${diffLine(l.before,l.after)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}
function diffLine(before,after){
  if(before && after) return `تعديل: <b>${esc(shortJson(before))}</b> ← <b>${esc(shortJson(after))}</b>`;
  if(after && !before) return `أُضيف: <b>${esc(shortJson(after))}</b>`;
  if(before && !after) return `حُذف: <b>${esc(shortJson(before))}</b>`;
  return '-';
}
function shortJson(o){
  try{
    if(o.name) return o.name;
    if(o.number) return o.number;
    if(o.date && o.name) return `${o.name} (${o.date})`;
    return JSON.stringify(o).slice(0,60);
  }catch(e){ return ''; }
}

/* ===================== AI ASSISTANT (Gemini) ===================== */
function toggleAI(){
  document.getElementById('aiPanel').classList.toggle('open');
}
function renderAIMsgs(){
  const box = document.getElementById('aiMsgs');
  box.innerHTML = aiHistory.map(m=>`<div class="ai-msg ${m.role==='user'?'user':'bot'}">${esc(m.text)}</div>`).join('')
    || `<div class="muted" style="text-align:center;padding:10px;">اسأل عن نقص الطاقم، توازن التصنيفات، أو أي تحليل للتخطيط الحالي.</div>`;
  box.scrollTop = box.scrollHeight;
}
async function sendAI(){
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if(!text || !state) return;

  if(!state.geminiApiKey){
    aiHistory.push({role:'user', text});
    aiHistory.push({role:'bot', text:'لسه محطتش مفتاح Gemini API. روح لصفحة "الإعدادات" وحط المفتاح الأول (تقدر تجيبه مجاناً من aistudio.google.com)، وبعدها المساعد هيشتغل من أي متصفح أو جهاز.'});
    input.value='';
    renderAIMsgs();
    return;
  }

  input.value='';
  aiHistory.push({role:'user', text});
  renderAIMsgs();
  aiHistory.push({role:'bot', text:'...جاري التحليل'});
  renderAIMsgs();

  const context = {
    shiftName: state.shiftName,
    operators: state.crew.operators.map(o=>({name:o.name, rating:o.rating})),
    loaders: state.crew.loaders.length,
    forklifts: state.crew.forklifts.length,
    vessels: state.vessels.map(v=>({name:v.name, eta:v.eta, cargo:v.cargo})),
    leaves: state.leaves,
    rosterDates: state.rosterDates
  };
  const sys = `أنت مساعد ذكاء اصطناعي داخل تطبيق "Roster" لإدارة موانئ الأوناش. تحدث بالعربية دائماً، بإيجاز ووضوح. لديك بيانات التطبيق الحالية بصيغة JSON. حلل النقص المحتمل في الطاقم، توازن التصنيفات A/B/C بين الأوناش، وأجب عن أسئلة المستخدم بناءً على البيانات فقط. إن لم تكفِ البيانات للإجابة، وضح ذلك بإيجاز.
بيانات التطبيق:
${JSON.stringify(context)}`;

  try{
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-goog-api-key": state.geminiApiKey
        },
        body: JSON.stringify({
          systemInstruction: { parts:[{ text: sys }] },
          contents: [ { role:"user", parts:[{ text: text }] } ]
        })
      }
    );
    const data = await response.json();
    if(!response.ok){
      const msg = (data && data.error && data.error.message) ? data.error.message : `HTTP ${response.status}`;
      throw new Error(msg);
    }
    const parts = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) || [];
    const reply = parts.map(p=>p.text||'').join('\n').trim() || 'تعذر الحصول على رد الآن.';
    aiHistory[aiHistory.length-1] = {role:'bot', text:reply};
  }catch(e){
    aiHistory[aiHistory.length-1] = {role:'bot', text:'حدث خطأ أثناء الاتصال بـ Gemini: '+(e.message||e)+'\n\nتأكد إن المفتاح صحيح ومفعّل من aistudio.google.com، وإن الجهاز متصل بالإنترنت.'};
  }
  renderAIMsgs();
}
